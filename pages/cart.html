<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — Neo-Bazaar</title>

  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0b0918;
      --surface: #121020;
      --card: #1a1730;
      --border: #2a2248;
      --purple: #a78bfa;
      --orange: #f97316;
      --text: #e2deff;
      --muted: #6b5fa0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      margin: 0;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(90deg, #a78bfa, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      font-family: 'Syne';
      margin-bottom: 20px;
    }

    .cart-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-name {
      font-size: 14px;
    }

    .item-price {
      color: var(--orange);
      font-weight: bold;
    }

    .total-box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }

    .checkout-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #f97316);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne';
      font-weight: 700;
      cursor: pointer;
    }

    .empty {
      color: var(--muted);
    }
        button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    }

    button:hover {
    border-color: var(--purple);
    }
  </style>
</head>

<body>


<nav>
  <a href="../index.html" class="nav-logo">Neo-Bazaar</a>
  <a href="../index.html" onclick="localStorage.setItem('cart', JSON.stringify(cart)); window.location.replace('../index.html'); return false;" style="color:var(--muted); text-decoration:none;">← Continue Shopping</a>
</nav>

<div class="container">
  <h1>🛒 Your Cart</h1>

  <div id="cartItems"></div>

  <div class="total-box">
    <span>Total</span>
    <span id="totalPrice">₹0</span>
  </div>

  <button class="checkout-btn" onclick="goToCheckout()">
    Proceed to Checkout →
  </button>
</div>

<script>
let cart = [];

function loadCart() {
  cart = JSON.parse(localStorage.getItem("cart")) || [];
  renderCart();
}



function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  if (!cart.length) {
    container.innerHTML = `<p class="empty">Your cart is empty</p>`;
    document.getElementById("totalPrice").innerText = "₹0";
    return;
  }
  let total = 0;

  cart.forEach((item, index) => {
    const qty = item.quantity || item.qty || 1;
    total += item.price * qty;

    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <div style="display:flex; gap:16px; align-items:center; width:100%;">

        <!-- IMAGE -->
        <div style="width:70px;height:70px;background:#2a2248;border-radius:10px;overflow:hidden;">
          <img src="${item.image || 'https://via.placeholder.com/70'}"
               style="width:100%;height:100%;object-fit:cover;">
        </div>

        <!-- DETAILS -->
        <div style="flex:1;">
          <div style="font-weight:600;">${item.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">
            ₹${item.price} × ${qty}
          </div>

          <div style="font-size:11px;color:#22c55e;margin-top:4px;">
            In stock
        </div>

          <!-- CONTROLS -->
          <div style="margin-top:8px; display:flex; gap:10px; align-items:center;">
            <button onclick="changeQty(${index}, -1)">−</button>
            <span>${qty}</span>
            <button onclick="changeQty(${index}, 1)">+</button>

            <button onclick="removeItem(${index})"
              style="margin-left:15px;color:#f97316;background:none;border:none;cursor:pointer;">
              Delete
            </button>
          </div>
        </div>

        <!-- PRICE -->
        <div style="font-family:'Syne'; font-weight:700; color:var(--orange);">
          ₹${item.price * qty}
        </div>

      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("totalPrice").innerText = "₹" + total;
}
function changeQty(index, change) {
  if (!cart[index].quantity) {
    cart[index].quantity = cart[index].qty || 1;
  }
  cart[index].quantity += change;
  if (cart[index].quantity <= 0) {
    cart.splice(index, 1);
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("cartUpdated", Date.now());
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("cartUpdated", Date.now());
  renderCart();
}

loadCart();
document.addEventListener("DOMContentLoaded", loadCart);

window.addEventListener("unload", () => {
  localStorage.setItem("cart", JSON.stringify(cart));
});

function goToCheckout() {
  if (!cart.length) {
    alert("Your cart is empty!");
    return;
  }
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "checkout.html";
}

window.addEventListener("beforeunload", () => {
      localStorage.setItem("cart", JSON.stringify(cart));
      localStorage.setItem("cartUpdated", Date.now());
    });
</script>

</body>
</html>
